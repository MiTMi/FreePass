name: FreePass

options:
  bundleIdPrefix: com.freepass
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: X4VTA8BYAW
    ENABLE_HARDENED_RUNTIME: true
    PRODUCT_NAME: FreePass

targets:
  FreePass:
    type: application
    platform: macOS
    sources:
      - path: FreePass
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freepass.app
        CODE_SIGN_ENTITLEMENTS: FreePass/FreePass.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FreePass
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "FreePass uses biometrics to unlock your vault."
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
