name: FreePass

options:
  bundleIdPrefix: com.freepass
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: L5774582ZK
    ENABLE_HARDENED_RUNTIME: true
    PRODUCT_NAME: FreePass

targets:
  FreePass:
    type: application
    platform: macOS
    sources:
      - path: FreePass
        excludes:
          - "*.entitlements"
    dependencies:
      - target: FreePassExtension Extension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freepass.app
        CODE_SIGN_ENTITLEMENTS: FreePass/FreePass.entitlements
        CODE_SIGN_IDENTITY: "Apple Development"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FreePass
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "FreePass uses biometrics to unlock your vault."
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FreePassExtension:
    type: application
    platform: macOS
    sources:
      - path: FreePassExtension
    dependencies:
      - target: FreePassExtension Extension
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freepass.app.FreePassExtension
        PRODUCT_NAME: "$(TARGET_NAME)"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: FreePassExtension
        INFOPLIST_KEY_NSMainStoryboardFile: Main
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        OTHER_LDFLAGS:
          - "-framework"
          - SafariServices
          - "-framework"
          - WebKit

  FreePassExtension Extension:
    type: app-extension
    platform: macOS
    sources:
      - path: FreePassExtension Extension
        excludes:
          - Resources/images
          - Resources/_locales
      - path: FreePassExtension Extension/Resources/images
        type: folder
      - path: FreePassExtension Extension/Resources/_locales
        type: folder
    info:
      path: "FreePassExtension Extension/Info.plist"
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: "com.apple.Safari.web-extension"
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SafariWebExtensionHandler"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freepass.app.FreePassExtension.Extension
        CODE_SIGN_ENTITLEMENTS: "FreePassExtension Extension/FreePassExtension_Extension.entitlements"
        ENABLE_APP_SANDBOX: true
        PRODUCT_NAME: "$(TARGET_NAME)"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: "FreePassExtension Extension"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SKIP_INSTALL: true
        SWIFT_VERSION: "5.0"
        OTHER_LDFLAGS:
          - "-framework"
          - SafariServices
